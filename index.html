<!DOCTYPE html>
<html>
<head>
  <title>My Vibe Space</title>
  <meta charset="UTF-8">
  <style>
    body { margin:0; font-family:Poppins; background:#ffcce6; overflow:hidden;}

    #loginPage, #landing, #interestPage, #mainContent {
      width:100%; height:100vh;
      display:flex; flex-direction:column;
      justify-content:center; align-items:center;
      position:absolute; top:0; left:0;
    }
    #landing, #interestPage, #mainContent { display:none; }

    input { padding:10px; margin:5px; border:none; border-radius:10px;}
    button { padding:10px 20px; border:none; border-radius:20px; cursor:pointer; }

    /* Stars & Hearts */
    .star, .heart {
      position:absolute;
      opacity:0.8;
      animation:twinkle 2s infinite alternate;
    }
    .star { width:6px; height:6px; border-radius:50%; background:white;}
    .heart {
      width:12px; height:12px;
      clip-path: polygon(50% 0%, 61% 14%, 75% 14%, 84% 27%, 84% 50%, 50% 90%, 16% 50%, 16% 27%, 25% 14%, 39% 14%);
      background:pink;
    }
    @keyframes twinkle { from{opacity:0.3;} to{opacity:1;} }

    /* Interests */
    .interestBtn {
      padding:15px;
      border-radius:15px;
      margin:5px;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }
    .selected { outline:3px solid white; }

    /* Pinterest Grid */
    #gridContainer {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
      width: 90%;
      max-width: 1200px;
      margin-top: 20px;
    }
    .gridItem {
      border-radius: 15px;
      overflow: hidden;
    }
    .gridItem img {
      width: 100%;
      display: block;
    }
  </style>
</head>
<body>

<div id="loginPage">
  <h1>Login / Signup</h1>
  <input id="username" placeholder="Username"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="login()">Enter</button>
</div>

<div id="landing">
  <h1>Welcome 💖</h1>
  <button onclick="goInterest()">Enter</button>
</div>

<div id="interestPage">
  <h2>Pick Your Interests</h2>
  <div id="interests"></div>
  <button onclick="goMain()">Continue</button>
</div>

<div id="mainContent">
  <h1>✨ My Vibe Space ✨</h1>
  <div id="gridContainer"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// 🔥 REPLACE THIS WITH YOUR REAL FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "PASTE_REAL_KEY_HERE",
  authDomain: "my-vibe-space.firebaseapp.com",
  projectId: "my-vibe-space",
  storageBucket: "my-vibe-space.appspot.com",
  messagingSenderId: "807828405073",
  appId: "1:807828405073:web:261e74ae03443940387170"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

// 🌟 Stars
function stars(){
  for(let i=0;i<40;i++){
    let s=document.createElement('div');
    s.className='star';
    s.style.top=Math.random()*100+'%';
    s.style.left=Math.random()*100+'%';
    document.body.appendChild(s);
  }
}
stars();

// 💖 Hearts
function hearts(){
  for(let i=0;i<20;i++){
    let h=document.createElement('div');
    h.className='heart';
    h.style.top=Math.random()*100+'%';
    h.style.left=Math.random()*100+'%';
    h.style.background=`hsl(${Math.random()*360},70%,80%)`;
    document.body.appendChild(h);
  }
}
hearts();

// 🎨 Interests
const list=["Art","Music","Fashion","Gaming","Cooking","Nature"];
let selected=[];
const container=document.getElementById('interests');

list.forEach((name,i)=>{
  let btn=document.createElement('button');
  btn.className='interestBtn';
  btn.innerText=name;
  btn.style.background=`hsl(${i*60},70%,70%)`;

  btn.onclick=()=>{
    btn.classList.toggle('selected');
    if(selected.includes(name)){
      selected = selected.filter(x=>x!==name);
    } else {
      selected.push(name);
    }
    save();
  };

  container.appendChild(btn);
});

// 🔐 Login
window.login = async ()=>{
  let u=document.getElementById('username').value;
  let p=document.getElementById('password').value;

  try{
    await signInWithEmailAndPassword(auth,u+"@test.com",p);
  }catch{
    await createUserWithEmailAndPassword(auth,u+"@test.com",p);
  }
};

onAuthStateChanged(auth, async(user)=>{
  if(user){
    document.getElementById('loginPage').style.display='none';
    document.getElementById('landing').style.display='flex';

    let d = await getDoc(doc(db,'users',user.uid));
    if(d.exists()) {
      selected = d.data().interests || [];
      // mark selected buttons
      document.querySelectorAll('.interestBtn').forEach(btn=>{
        if(selected.includes(btn.innerText)) btn.classList.add('selected');
      });
    }
  }
});

// Save interests to Firestore
async function save(){
  let user = auth.currentUser;
  if(user){
    await setDoc(doc(db,'users',user.uid),{interests:selected});
  }
}

// Navigation
window.goInterest = ()=>{
  document.getElementById('landing').style.display='none';
  document.getElementById('interestPage').style.display='flex';
};

window.goMain = ()=>{
  document.getElementById('interestPage').style.display='none';
  document.getElementById('mainContent').style.display='flex';

  // Sample Pinterest Grid Images
  const images = [
    'https://source.unsplash.com/random/200x200?sig=1',
    'https://source.unsplash.com/random/200x200?sig=2',
    'https://source.unsplash.com/random/200x200?sig=3',
    'https://source.unsplash.com/random/200x200?sig=4',
    'https://source.unsplash.com/random/200x200?sig=5',
    'https://source.unsplash.com/random/200x200?sig=6',
  ];
  const grid = document.getElementById('gridContainer');
  grid.innerHTML = ''; // clear previous
  images.forEach(src=>{
    let div = document.createElement('div');
    div.className='gridItem';
    let img = document.createElement('img');
    img.src = src;
    div.appendChild(img);
    grid.appendChild(div);
  });
};
</script>

</body>
</html>
