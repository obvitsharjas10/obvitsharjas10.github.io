<!DOCTYPE html>
<html>
<head>
  <title>My Vibe Space</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600&display=swap');

    body {
      font-family: 'Poppins', sans-serif;
      margin:0; padding:0;
      overflow-x: hidden;
      background: #ffcce6; /* baby pink */
    }

    /* Landing page */
    #landing {
      position: fixed; top:0; left:0; width:100%; height:100%;
      background: #ffcce6;
      display:flex; flex-direction:column; justify-content:center; align-items:center;
      color:white; overflow:hidden; z-index:1000;
    }

    #landing h1 {
      font-family:'Pacifico', cursive;
      font-size:60px; margin-bottom:50px; text-shadow:2px 2px 8px rgba(0,0,0,0.2);
    }

    #enterBtn {
      padding:20px 50px; font-size:24px; font-weight:bold;
      border:none; border-radius:50px;
      cursor:pointer; background:#ff4d94; color:white;
      box-shadow:0 0 20px rgba(255,77,148,0.6);
      transition: all 0.4s;
    }

    #enterBtn:hover { transform:scale(1.1); box-shadow:0 0 40px rgba(255,77,148,0.8); }

    /* Stars and hearts */
    .star, .heart {
      position:absolute; width:8px; height:8px; border-radius:50%; opacity:0.8;
      animation: twinkle 2s infinite alternate;
    }
    .heart { width:10px; height:10px; background:white; clip-path: polygon(50% 0%, 61% 14%, 75% 14%, 84% 27%, 84% 50%, 50% 90%, 16% 50%, 16% 27%, 25% 14%, 39% 14%); }

    @keyframes twinkle { 0% {opacity:0.3;} 100% {opacity:1;} }

    /* Main content */
    #mainContent { display:none; padding-top:20px; text-align:center; background:#ffcce6; min-height:100vh; }

    h1.mainTitle { color:#fff; font-family:'Pacifico', cursive; font-size:48px; text-shadow:2px 2px 10px #ff99c2; }

    button.category {
      padding:10px 20px; margin:5px; border:none; border-radius:20px;
      background-color: #ff99c2; cursor:pointer; font-size:16px; color:white;
      font-weight:600; transition:0.3s;
    }

    button.category:hover { background:#ff4d94; }

    #addPostBtn { padding:10px 15px; margin:10px; border-radius:15px; background:#ff6699; color:white; cursor:pointer; font-weight:bold; }

    #content {
      display:flex; flex-wrap:wrap; justify-content:center; gap:15px; margin:20px;
    }

    .post {
      background:white; border-radius:15px; box-shadow:0 0 10px rgba(255,77,148,0.3);
      width:200px; margin-bottom:15px; text-align:center; overflow:hidden; display:flex; flex-direction:column;
      transition:transform 0.2s, box-shadow 0.2s;
    }

    .post img { width:100%; display:block; }
    .post h3 { margin:10px 0 5px; font-size:16px; }
    .post p { margin:0 10px 10px; font-size:14px; color:#555; }

    .post:hover { transform:translateY(-5px); box-shadow:0 0 20px rgba(255,77,148,0.5); }

    @media(max-width:650px){ .post{width:90%;} }

    /* Lightbox */
    #lightbox {
      display:none; position:fixed; top:0; left:0; width:100%; height:100%;
      background:rgba(0,0,0,0.7); justify-content:center; align-items:center;
      z-index:2000;
    }
    #lightbox img { max-width:80%; max-height:80%; border-radius:15px; }
  </style>
</head>
<body>

<!-- Landing page -->
<div id="landing">
  <h1>Welcome to My Web Space</h1>
  <button id="enterBtn" onclick="enterSite()">Enter My Vibe Space</button>
  <!-- Stars & hearts -->
  <div id="starsContainer"></div>
</div>

<!-- Main content -->
<div id="mainContent">
  <h1 class="mainTitle">✨ My Vibe Space ✨</h1>
  <div id="categoriesContainer">
    <!-- Categories buttons will go here -->
  </div>
  <button id="addPostBtn" onclick="addPostPrompt()">+ Add Your Own Post</button>
  <div id="content"></div>
</div>

<!-- Lightbox -->
<div id="lightbox" onclick="closeLightbox()"><img id="lightboxImg"></div>

<script>
  // Generate stars and hearts
  function createStars(containerId, count){
    const container=document.getElementById(containerId);
    for(let i=0;i<count;i++){
      const star=document.createElement('div');
      star.className='star';
      star.style.background='white';
      star.style.top=Math.random()*100+'%';
      star.style.left=Math.random()*100+'%';
      star.style.width=2+Math.random()*4+'px';
      star.style.height=2+Math.random()*4+'px';
      container.appendChild(star);
    }
    for(let i=0;i<count/2;i++){
      const heart=document.createElement('div');
      heart.className='heart';
      heart.style.top=Math.random()*100+'%';
      heart.style.left=Math.random()*100+'%';
      container.appendChild(heart);
    }
  }
  createStars('starsContainer',50);

  // Categories
  const categories = [
    'Art','Music','Fashion','Gaming','Cooking','Mukbangs','Nature','Flowers','Sky','Birds','Animals','School/Study','TV Shows','Room Decor'
  ];

  const postsData={};
  categories.forEach(cat=>{
    postsData[cat]=[];
    for(let i=1;i<=15;i++){
      postsData[cat].push({
        img:'https://picsum.photos/200/'+(180+Math.floor(Math.random()*70))+'?random='+Math.floor(Math.random()*1000),
        title:cat+' Post '+i,
        desc:'Cute and fun '+cat+' content!'
      });
    }
  });

  const categoriesContainer=document.getElementById('categoriesContainer');
  categories.forEach(cat=>{
    const btn=document.createElement('button');
    btn.className='category';
    btn.innerText=cat;
    btn.onclick=()=>showContent(cat);
    categoriesContainer.appendChild(btn);
  });

  let currentCategory='Art';
  let loadedCount=0;

  function showContent(category){
    currentCategory=category;
    loadedCount=0;
    document.getElementById('content').innerHTML='';
    loadMorePosts();
  }

  function loadMorePosts(){
    const content=document.getElementById('content');
    const data=postsData[currentCategory];
    for(let i=loadedCount;i<loadedCount+5 && i<data.length;i++){
      const post=document.createElement('div');
      post.className='post';
      post.innerHTML=`<img src="${data[i].img}" alt="${data[i].title}" onclick="openLightbox('${data[i].img}')"><h3>${data[i].title}</h3><p>${data[i].desc}</p>`;
      content.appendChild(post);
    }
    loadedCount+=5;
  }

  window.addEventListener('scroll',()=>{
    if(window.innerHeight + window.scrollY >= document.body.offsetHeight -10){
      loadMorePosts();
    }
  });

  // Landing page enter
  function enterSite(){
    document.getElementById('landing').style.display='none';
    document.getElementById('mainContent').style.display='block';
    showContent('Art');
    createStars('mainContent',100); // more stars and hearts in main space
  }

  // Add new post
  function addPostPrompt(){
    const img=prompt("Enter image URL:");
    if(!img) return;
    const title=prompt("Enter title:")||'New Post';
    const desc=prompt("Enter description:")||'Cute content!';
    postsData[currentCategory].push({img,title,desc});
    loadMorePosts();
  }

  // Lightbox
  function openLightbox(src){
    document.getElementById('lightboxImg').src=src;
    document.getElementById('lightbox').style.display='flex';
  }
  function closeLightbox(){ document.getElementById('lightbox').style.display='none'; }
</script>

</body>
</html>
