<!DOCTYPE html>
<html>
<head>
  <title>My Vibe Space</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600&display=swap');
    body { font-family: 'Poppins', sans-serif; margin:0; padding:0; background:#ffcce6; overflow-x:hidden;}

    /* General Buttons */
    button { border:none; border-radius:50px; cursor:pointer; font-weight:bold; transition:0.3s;}
    button:hover{ transform:scale(1.05);}

    /* Login / Signup */
    #loginPage, #landing, #interestPage, #mainContent { width:100%; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; position:absolute; top:0; left:0; }
    #loginPage { background:#ffb6c1; color:white; }
    #loginPage input { padding:10px; margin:5px; border-radius:10px; border:none; width:200px;}
    #loginPage button { padding:10px 30px; background:#ff4d94; color:white; margin-top:10px;}

    /* Landing Page */
    #landing { background:#ffcce6; color:white; overflow:hidden; display:none; }
    #landing h1 { font-family:'Pacifico', cursive; font-size:50px; margin-bottom:50px; text-shadow:2px 2px 8px rgba(0,0,0,0.2);}
    #enterBtn { padding:20px 50px; font-size:24px; background:#ff4d94; color:white;}

    /* Stars & Hearts */
    .star, .heart { position:absolute; opacity:0.8; animation:twinkle 2s infinite alternate; }
    .star{ background:white; border-radius:50%; }
    .heart{ width:15px; height:15px; background:white; clip-path: polygon(50% 0%, 61% 14%, 75% 14%, 84% 27%, 84% 50%, 50% 90%, 16% 50%, 16% 27%, 25% 14%, 39% 14%);}
    @keyframes twinkle{0%{opacity:0.3;}100%{opacity:1;}}

    /* Interest Selection */
    #interestPage { display:none; padding:20px; text-align:center; min-height:100vh; background:#ffcce6; }
    .interestGrid { display:flex; flex-wrap:wrap; justify-content:center; gap:15px; margin-top:20px;}
    .interestBox{ width:140px; height:140px; border-radius:20px; display:flex; flex-direction:column; justify-content:center; align-items:center; cursor:pointer; font-weight:bold; font-size:16px; position:relative; text-align:center; padding:10px; transition: transform 0.3s, box-shadow 0.3s;}
    .interestBox img{ width:80px; height:80px; border-radius:15px; margin-bottom:5px; object-fit:cover;}
    .interestBox.selected{ box-shadow:0 0 20px rgba(255,77,148,0.7); transform:scale(1.05);}
    #continueBtn { position:fixed; right:20px; top:50%; transform:translateY(-50%); padding:15px 30px; background:#ff4d94; color:white;}

    /* Main Vibe Space */
    #mainContent{ display:none; padding:20px; background:#ffcce6; min-height:100vh; text-align:center;}
    h1.mainTitle{ font-family:'Pacifico', cursive; color:white; font-size:48px; text-shadow:2px 2px 10px #ff99c2;}
    #menuBtn{ position:fixed; top:20px; right:20px; padding:10px 15px; border-radius:15px; background:#ff6699; color:white; cursor:pointer; font-weight:bold; z-index:3000;}
    #addPostBtn{ position:fixed; top:70px; right:20px; padding:10px 15px; border-radius:15px; background:#ff99cc; color:white; cursor:pointer; font-weight:bold; z-index:3000;}
    #content{ display:flex; flex-wrap:wrap; justify-content:center; gap:15px; margin-top:100px; }
    .post{ background:white; border-radius:15px; box-shadow:0 0 10px rgba(255,77,148,0.3); width:200px; margin-bottom:15px; text-align:center; display:flex; flex-direction:column; transition:transform 0.2s, box-shadow 0.2s; }
    .post img{ width:100%; display:block; border-radius:15px; cursor:pointer;}
    .post h3{ margin:10px 0 5px; font-size:16px;}
    .post p{ margin:0 10px 10px; font-size:14px; color:#555;}
    .post:hover{ transform:translateY(-5px); box-shadow:0 0 20px rgba(255,77,148,0.5);}

    /* Lightbox */
    #lightbox{ display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); justify-content:center; align-items:center; z-index:2000; }
    #lightbox img{ max-width:80%; max-height:80%; border-radius:15px;}
  </style>
</head>
<body>

<!-- Login / Signup -->
<div id="loginPage">
  <h1>Login to My Vibe Space</h1>
  <input type="text" id="username" placeholder="Username"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button onclick="login()">Login / Signup</button>
</div>

<!-- Landing Page -->
<div id="landing">
  <h1>Welcome to My Web Space</h1>
  <button id="enterBtn" onclick="enterInterestPage()">Enter My Vibe Space</button>
  <div id="starsContainer"></div>
</div>

<!-- Interest Selection Page -->
<div id="interestPage">
  <h1>Select Your Interests</h1>
  <div class="interestGrid" id="interestGrid"></div>
  <button id="continueBtn" onclick="continueToVibeSpace()">Continue</button>
</div>

<!-- Main Vibe Space -->
<div id="mainContent">
  <h1 class="mainTitle">✨ My Vibe Space ✨</h1>
  <button id="menuBtn" onclick="openSettings()">Settings</button>
  <button id="addPostBtn" onclick="addPostPrompt()">+ Add Your Own Post</button>
  <div id="content"></div>
</div>

<!-- Lightbox -->
<div id="lightbox" onclick="closeLightbox()"><img id="lightboxImg"></div>

<script>
  // --- Stars & Hearts ---
  function createStars(containerId, count){
    const container=document.getElementById(containerId);
    for(let i=0;i<count;i++){
      const star=document.createElement('div');
      star.className='star';
      star.style.width=6+Math.random()*10+'px';
      star.style.height=6+Math.random()*10+'px';
      star.style.top=Math.random()*100+'%';
      star.style.left=Math.random()*100+'%';
      container.appendChild(star);
    }
    for(let i=0;i<count/2;i++){
      const heart=document.createElement('div');
      heart.className='heart';
      heart.style.top=Math.random()*100+'%';
      heart.style.left=Math.random()*100+'%';
      container.appendChild(heart);
    }
  }
  createStars('starsContainer',50);

  // --- Login / Signup ---
  function login(){
    const username=document.getElementById('username').value;
    const password=document.getElementById('password').value;
    if(!username || !password){ alert("Please enter username and password"); return;}
    document.getElementById('loginPage').style.display='none';
    document.getElementById('landing').style.display='flex';
  }

  // --- Interest Selection ---
  const interests = [
    {name:'Art', color:'#FFB6C1', img:'https://picsum.photos/80/80?random=1'},
    {name:'Music', color:'#FF69B4', img:'https://picsum.photos/80/80?random=2'},
    {name:'Fashion', color:'#FF99CC', img:'https://picsum.photos/80/80?random=3'},
    {name:'Gaming', color:'#FFB3E6', img:'https://picsum.photos/80/80?random=4'},
    {name:'Cooking', color:'#FFC0CB', img:'https://picsum.photos/80/80?random=5'},
    {name:'Mukbangs', color:'#FFB6C1', img:'https://picsum.photos/80/80?random=6'},
    {name:'Nature', color:'#FFD1DC', img:'https://picsum.photos/80/80?random=7'},
    {name:'Flowers', color:'#FFCCE5', img:'https://picsum.photos/80/80?random=8'},
    {name:'Sky', color:'#FFE0F0', img:'https://picsum.photos/80/80?random=9'},
    {name:'Birds', color:'#FFCCF2', img:'https://picsum.photos/80/80?random=10'},
    {name:'Animals', color:'#FFB3CC', img:'https://picsum.photos/80/80?random=11'},
    {name:'School/Study', color:'#FFCCE0', img:'https://picsum.photos/80/80?random=12'},
    {name:'TV Shows', color:'#FFD1E0', img:'https://picsum.photos/80/80?random=13'},
    {name:'Room Decor', color:'#FFC4E3', img:'https://picsum.photos/80/80?random=14'}
  ];

  let selectedInterests=[];
  const interestGrid=document.getElementById('interestGrid');
  interests.forEach(intObj=>{
    const box=document.createElement('div');
    box.className='interestBox';
    box.style.background=intObj.color;
    box.innerHTML=`<img src="${intObj.img}"><div>${intObj.name}</div>`;
    box.onclick=()=>{
      box.classList.toggle('selected');
      if(selectedInterests.includes(intObj.name)){
        selectedInterests=selectedInterests.filter(i=>i!==intObj.name);
      }else{
        selectedInterests.push(intObj.name);
      }
    };
    interestGrid.appendChild(box);
  });

  // --- Page Flow ---
  function enterInterestPage(){
    document.getElementById('landing').style.display='none';
    document.getElementById('interestPage').style.display='block';
  }
  function continueToVibeSpace(){
    if(selectedInterests.length===0){ alert("Select at least one interest!"); return;}
    document.getElementById('interestPage').style.display='none';
    document.getElementById('mainContent').style.display='block';
    loadPosts();
  }

  // --- Posts ---
  const postsData={};
  interests.forEach(intObj=>postsData[intObj.name]=[]);
  function loadPosts(){
    const content=document.getElementById('content');
    content.innerHTML='';
    selectedInterests.forEach(cat=>{
      const data=postsData[cat];
      data.forEach(post=>{
        const div=document.createElement('div');
        div.className='post';
        div.innerHTML=`<img src="${post.img}" onclick="openLightbox('${post.img}')"><h3>${post.title}</h3><p>${post.desc}</p>`;
        content.appendChild(div);
      });
    });
  }

  function openSettings(){
    const newSelection=prompt("Enter interests to add/remove, comma separated:", selectedInterests.join(', '));
    if(newSelection!==null){
      selectedInterests=newSelection.split(',').map(s=>s.trim()).filter(s=>interests.map(i=>i.name).includes(s));
      loadPosts();
    }
  }

  function addPostPrompt(){
    const cat=prompt("Which category is this post for?", selectedInterests[0]);
    if(!cat) return;
    const img=prompt("Enter image URL:"); if(!img) return;
    const title=prompt("Enter title:")||"New Post";
    const desc=prompt("Enter description:")||"Cute content!";
    postsData[cat].push({img,title,desc});
    loadPosts();
  }

  // --- Lightbox ---
  function openLightbox(src){
    document.getElementById('lightboxImg').src=src;
    document.getElementById('lightbox').style.display='flex';
  }
  function closeLightbox(){ document.getElementById('lightbox').style.display='none'; }
</script>
</body>
</html>
