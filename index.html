<!DOCTYPE html>
<html>
<head>
  <title>My Website</title>
</head>
<body>

  <h1>Welcome to My Website 💕</h1>
  <p>Pick your interests:</p>

  <button onclick="showContent('art')">🎨 Art</button>
  <button onclick="showContent('roblox')">🎮 Roblox</button>
  <button onclick="showContent('gym')">💪 Gym</button>

  <div id="content" style="margin-top:20px;"></div>

  <script>
    function showContent(type) {
      const content = document.getElementById("content");

      if (type === "art") {
        content.innerHTML = "<h2>Art Posts</h2><p>People sharing drawings 🎨</p>";
      }
      if (type === "roblox") {
        content.innerHTML = "<h2>Roblox Posts</h2><p>Game builds and ideas 🎮</p>";
      }
      if (type === "gym") {
        content.innerHTML = "<h2>Gym Posts</h2><p>Workout tips 💪</p>";
      }
    }
  </script>

</body>
</html>
