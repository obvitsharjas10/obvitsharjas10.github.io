<!DOCTYPE html>
<html>
<head>
  <title>My Vibe Space</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    /* Landing page styles */
    #landing {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #ffb6c1, #ff8fab);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      z-index: 1000;
    }

    #landing h1 {
      font-size: 50px;
      margin-bottom: 20px;
      text-shadow: 1px 1px 5px rgba(0,0,0,0.3);
    }

    #landing button {
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      background: white;
      color: #ff6b81;
      font-weight: bold;
      transition: all 0.3s;
    }

    #landing button:hover {
      background: #ffdfdf;
    }

    /* Main content styles */
    #mainContent {
      display: none;
      padding-top: 20px;
    }

    h1.mainTitle {
      color: #333;
      margin-top: 20px;
    }

    button.category {
      padding: 10px 20px;
      margin: 5px;
      border: none;
      border-radius: 20px;
      background-color: #ffb6c1;
      cursor: pointer;
      font-size: 16px;
    }

    button.category:hover {
      background-color: #ff8fab;
    }

    #content {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      margin: 20px;
    }

    .post {
      background: white;
      border-radius: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 200px;
      margin-bottom: 15px;
      text-align: center;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .post img {
      width: 100%;
      display: block;
    }

    .post h3 {
      margin: 10px 0 5px;
      font-size: 16px;
    }

    .post p {
      margin: 0 10px 10px;
      font-size: 14px;
      color: #555;
    }

    @media(max-width:650px){ 
      .post{width:90%;} 
    }
  </style>
</head>
<body>

<!-- Landing page -->
<div id="landing">
  <h1>Welcome to My Vibe Space</h1>
  <button onclick="enterSite()">Enter My Vibe Space</button>
</div>

<!-- Main website content -->
<div id="mainContent">
  <h1 class="mainTitle">✨ My Vibe Space ✨</h1>
  <p>Pick your interests:</p>

  <button class="category" onclick="showContent('art')">🎨 Art</button>
  <button class="category" onclick="showContent('roblox')">🎮 Roblox</button>
  <button class="category" onclick="showContent('gym')">💪 Gym</button>
  <button class="category" onclick="showContent('cooking')">🍳 Cooking</button>
  <button class="category" onclick="showContent('fashion')">👗 Fashion</button>
  <button class="category" onclick="showContent('music')">🎵 Music</button>
  <button class="category" onclick="showContent('study')">📚 Study</button>

  <div id="content"></div>
</div>

<script>
  // Landing page function
  function enterSite() {
    document.getElementById('landing').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    showContent('art'); // show default category
  }

  // Posts data
  const postsData = {
    art: [
      {img:"https://via.placeholder.com/200x250?text=Sketch+1", title:"My Sketch", desc:"Check out this digital art!"},
      {img:"https://via.placeholder.com/200x180?text=Painting", title:"Painting Idea", desc:"Colors and inspiration ✨"},
      {img:"https://via.placeholder.com/200x220?text=Sketch+2", title:"Sketch 2", desc:"More artwork ideas"}
    ],
    roblox: [
      {img:"https://via.placeholder.com/200x250?text=Roblox+Build", title:"Cool Build", desc:"Fun Roblox creation 🔥"},
      {img:"https://via.placeholder.com/200x200?text=Obby", title:"Obby Idea", desc:"Level design tips 🎮"},
      {img:"https://via.placeholder.com/200x180?text=Game", title:"Game Design", desc:"Make it more fun"}
    ],
    gym: [
      {img:"https://via.placeholder.com/200x180?text=Workout", title:"Workout Routine", desc:"Daily exercises 💪"},
      {img:"https://via.placeholder.com/200x220?text=Leg+Day", title:"Leg Day Tips", desc:"Strength & endurance"},
      {img:"https://via.placeholder.com/200x250?text=Abs", title:"Abs Training", desc:"Core exercises"}
    ],
    cooking: [
      {img:"https://via.placeholder.com/200x220?text=Recipe", title:"Recipe 1", desc:"Quick and tasty 🍳"},
      {img:"https://via.placeholder.com/200x180?text=Snack", title:"Snack Ideas", desc:"Easy to make"},
      {img:"https://via.placeholder.com/200x250?text=Dessert", title:"Dessert", desc:"Sweet treats 🍰"}
    ],
    fashion: [
      {img:"https://via.placeholder.com/200x250?text=Outfit+1", title:"Outfit Idea", desc:"Style tips 👗"},
      {img:"https://via.placeholder.com/200x200?text=Outfit+2", title:"Look 2", desc:"Trendy & chic"},
      {img:"https://via.placeholder.com/200x180?text=Accessories", title:"Accessories", desc:"Complete your outfit"}
    ],
    music: [
      {img:"https://via.placeholder.com/200x220?text=Song+1", title:"Song 1", desc:"Great vibes 🎵"},
      {img:"https://via.placeholder.com/200x180?text=Playlist", title:"Playlist", desc:"My favorite tracks"},
      {img:"https://via.placeholder.com/200x250?text=Album", title:"New Album", desc:"Check it out"}
    ],
    study: [
      {img:"https://via.placeholder.com/200x180?text=Notes", title:"Study Notes", desc:"Helpful guides 📚"},
      {img:"https://via.placeholder.com/200x220?text=Tips", title:"Study Hacks", desc:"Time-saving tips"},
      {img:"https://via.placeholder.com/200x250?text=Revision", title:"Revision", desc:"Quick review sheets"}
    ]
  };

  // Show content by category
  let currentCategory = 'art';
  let loadedCount = 0;

  function showContent(category){
    currentCategory = category;
    loadedCount = 0;
    document.getElementById('content').innerHTML = '';
    loadMorePosts();
  }

  function loadMorePosts(){
    const content = document.getElementById('content');
    const data = postsData[currentCategory];
    for(let i = loadedCount; i < loadedCount + 2 && i < data.length; i++){
      const post = document.createElement('div');
      post.className = 'post';
      post.innerHTML = `<img src="${data[i].img}" alt="${data[i].title}"><h3>${data[i].title}</h3><p>${data[i].desc}</p>`;
      content.appendChild(post);
    }
    loadedCount += 2;
  }

  // Infinite scroll
  window.addEventListener('scroll', () => {
    if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 10){
      loadMorePosts();
    }
  });
</script>

</body>
</html>
